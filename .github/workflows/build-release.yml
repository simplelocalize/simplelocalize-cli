name: Build and release

on:
  release:
    types: [created]
  push:
    branches:
      - 'master'
      - '*-snapshot'
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-jar:
    name: "Build JAR"
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        name: "Checkout"
      - uses: actions/setup-java@v4
        name: "Install Java"
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: 'maven'
      - name: "Build JAR"
        run: mvn -DskipTests -Pfatjar clean package
      - name: 'Get version'
        id: get-version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: 'Smoke test JAR'
        run: ./scripts/smoke-test.sh java -jar target/simplelocalize-cli-${{env.VERSION}}.jar
      - name: 'Upload artifact'
        uses: actions/upload-artifact@v4
        with:
          name: 'simplelocalize-cli-${{env.VERSION}}.jar'
          path: 'target/simplelocalize-cli-${{env.VERSION}}.jar'
      - name: 'Upload JAR to Release'
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: 'target/simplelocalize-cli-${{env.VERSION}}.jar'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-executable:
    name: "Build ${{ matrix.label }} executable"
    strategy:
      matrix:
        include:
          - os: 'ubuntu-latest'
            label: 'linux'
            filename: 'simplelocalize-cli'
            downloadFilename: 'simplelocalize-cli-linux'
          - os: 'ubuntu-24.04-arm'
            label: 'linux-arm64'
            filename: 'simplelocalize-cli'
            downloadFilename: 'simplelocalize-cli-linux-arm64'
          # https://github.blog/changelog/2026-02-26-macos-26-is-now-generally-available-for-github-hosted-runners/
          - os: 'macos-26-intel'
            label: 'mac'
            filename: 'simplelocalize-cli'
            downloadFilename: 'simplelocalize-cli-mac'
          - os: 'macos-26'
            label: 'mac-arm64'
            filename: 'simplelocalize-cli'
            downloadFilename: 'simplelocalize-cli-mac-arm64'
          - os: 'windows-latest'
            label: 'windows'
            filename: 'simplelocalize-cli.exe'
            downloadFilename: 'simplelocalize-cli-windows.exe'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        name: "Checkout"
      - name: "Print architecture"
        run: uname -m
        if: startsWith(matrix.os, 'macos')
      - uses: graalvm/setup-graalvm@v1
        name: "Install GraalVM"
        with:
          java-version: '21'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: "Build executable"
        run: mvn -DskipTests -Pnative clean package
      - name: "Smoke test executable"
        shell: bash
        run: ./scripts/smoke-test.sh ./target/${{ matrix.filename }}
      - name: "Rename executable"
        run: mv ./target/${{ matrix.filename }} ./target/${{ matrix.downloadFilename }}
      - name: "Ad-hoc sign executable (macOS)"
        if: startsWith(matrix.os, 'macos')
        run: |
          xattr -d com.apple.quarantine ./target/${{ matrix.downloadFilename }} 2>/dev/null || true
          codesign --force --deep --sign - ./target/${{ matrix.downloadFilename }}
          codesign --verify --verbose ./target/${{ matrix.downloadFilename }}
      - name: "Upload artifact"
        uses: actions/upload-artifact@v4
        with:
          name: simplelocalize-cli-${{ matrix.label }}
          path: ./target/${{ matrix.downloadFilename }}
      - name: 'Upload Executable to Release'
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: './target/${{ matrix.downloadFilename }}'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  bundle-release:
    name: "Bundle all files into a single ZIP"
    needs: [ build-jar, build-executable ]
    runs-on: ubuntu-latest
    steps:
      - name: "Download all artifacts"
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: "Create ZIP archive"
        run: |
          cd dist
          zip -j "../simplelocalize-cli-${{ needs.build-jar.outputs.version }}.zip" *
      - name: "Upload bundle artifact"
        uses: actions/upload-artifact@v4
        with:
          name: 'simplelocalize-cli-${{ needs.build-jar.outputs.version }}'
          path: 'simplelocalize-cli-${{ needs.build-jar.outputs.version }}.zip'
      - name: 'Upload bundle to Release'
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: 'simplelocalize-cli-${{ needs.build-jar.outputs.version }}.zip'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
